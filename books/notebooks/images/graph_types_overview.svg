<svg width="680" viewBox="0 0 680 350" xmlns="http://www.w3.org/2000/svg" style="background:#fff;font-family:Arial,Helvetica,sans-serif">
<defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round"/></marker></defs>
<text x="340" y="22" text-anchor="middle" font-weight="bold" font-size="14" fill="#333">Tipologie di grafo nei Knowledge Graph</text>

<!-- Directed -->
<rect x="20" y="45" width="145" height="120" rx="8" fill="#DBEAFE" stroke="#1E40AF" stroke-width="1"/>
<text x="92" y="65" text-anchor="middle" fill="#0C447C" font-weight="bold" font-size="11">Directed</text>
<circle cx="60" cy="100" r="12" fill="#B5D4F4" stroke="#1E40AF" stroke-width="1"/>
<text x="60" y="104" text-anchor="middle" fill="#0C447C" font-size="9">A</text>
<circle cx="125" cy="100" r="12" fill="#B5D4F4" stroke="#1E40AF" stroke-width="1"/>
<text x="125" y="104" text-anchor="middle" fill="#0C447C" font-size="9">B</text>
<line x1="72" y1="100" x2="111" y2="100" stroke="#1E40AF" stroke-width="1.5" marker-end="url(#a)"/>
<text x="92" y="145" text-anchor="middle" fill="#185FA5" font-size="9">A conosce B</text>
<text x="92" y="157" text-anchor="middle" fill="#185FA5" font-size="9">(non viceversa)</text>

<!-- Weighted -->
<rect x="180" y="45" width="145" height="120" rx="8" fill="#D1FAE5" stroke="#065F46" stroke-width="1"/>
<text x="252" y="65" text-anchor="middle" fill="#04342C" font-weight="bold" font-size="11">Weighted</text>
<circle cx="215" cy="100" r="12" fill="#9FE1CB" stroke="#065F46" stroke-width="1"/>
<text x="215" y="104" text-anchor="middle" fill="#04342C" font-size="9">A</text>
<circle cx="290" cy="100" r="12" fill="#9FE1CB" stroke="#065F46" stroke-width="1"/>
<text x="290" y="104" text-anchor="middle" fill="#04342C" font-size="9">B</text>
<line x1="227" y1="100" x2="276" y2="100" stroke="#065F46" stroke-width="2.5"/>
<text x="252" y="93" text-anchor="middle" fill="#065F46" font-size="8" font-weight="bold">0.87</text>
<text x="252" y="145" text-anchor="middle" fill="#0F6E56" font-size="9">Similarity, trust</text>
<text x="252" y="157" text-anchor="middle" fill="#0F6E56" font-size="9">ranking</text>

<!-- Labeled -->
<rect x="340" y="45" width="145" height="120" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="412" y="65" text-anchor="middle" fill="#3C3489" font-weight="bold" font-size="11">Labeled</text>
<circle cx="375" cy="100" r="12" fill="#CECBF6" stroke="#534AB7" stroke-width="1"/>
<text x="375" y="104" text-anchor="middle" fill="#3C3489" font-size="8">:Pers</text>
<circle cx="450" cy="100" r="12" fill="#CECBF6" stroke="#534AB7" stroke-width="1"/>
<text x="450" y="104" text-anchor="middle" fill="#3C3489" font-size="8">:Co</text>
<line x1="387" y1="100" x2="436" y2="100" stroke="#534AB7" stroke-width="1.5" marker-end="url(#a)"/>
<text x="412" y="93" text-anchor="middle" fill="#534AB7" font-size="7">WORKS_AT</text>
<text x="412" y="145" text-anchor="middle" fill="#534AB7" font-size="9">Nodi + archi tipati</text>
<text x="412" y="157" text-anchor="middle" fill="#534AB7" font-size="9">Standard KG moderno</text>

<!-- Bipartite -->
<rect x="500" y="45" width="160" height="120" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text x="580" y="65" text-anchor="middle" fill="#412402" font-weight="bold" font-size="11">Bipartite</text>
<circle cx="540" cy="90" r="9" fill="#FAC775" stroke="#854F0B" stroke-width="1"/>
<circle cx="540" cy="110" r="9" fill="#FAC775" stroke="#854F0B" stroke-width="1"/>
<circle cx="540" cy="130" r="9" fill="#FAC775" stroke="#854F0B" stroke-width="1"/>
<text x="540" y="93" text-anchor="middle" fill="#633806" font-size="7">U1</text>
<text x="540" y="113" text-anchor="middle" fill="#633806" font-size="7">U2</text>
<text x="540" y="133" text-anchor="middle" fill="#633806" font-size="7">U3</text>
<circle cx="620" cy="95" r="9" fill="#EF9F27" stroke="#854F0B" stroke-width="1"/>
<circle cx="620" cy="125" r="9" fill="#EF9F27" stroke="#854F0B" stroke-width="1"/>
<text x="620" y="98" text-anchor="middle" fill="#412402" font-size="7">P1</text>
<text x="620" y="128" text-anchor="middle" fill="#412402" font-size="7">P2</text>
<line x1="549" y1="90" x2="611" y2="95" stroke="#854F0B" stroke-width="0.8"/>
<line x1="549" y1="110" x2="611" y2="95" stroke="#854F0B" stroke-width="0.8"/>
<line x1="549" y1="110" x2="611" y2="125" stroke="#854F0B" stroke-width="0.8"/>
<line x1="549" y1="130" x2="611" y2="125" stroke="#854F0B" stroke-width="0.8"/>
<text x="580" y="155" text-anchor="middle" fill="#854F0B" font-size="9">User ↔ Product</text>

<!-- Bottom: All KG are... -->
<rect x="60" y="200" width="560" height="55" rx="10" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1"/>
<text x="340" y="222" text-anchor="middle" fill="#333" font-weight="bold" font-size="12">Tutti i Knowledge Graph moderni sono:</text>
<text x="340" y="242" text-anchor="middle" fill="#666" font-size="11">Directed + Labeled + potenzialmente Weighted + spesso Dynamic (versioned)</text>

<!-- Dynamic -->
<rect x="60" y="275" width="560" height="55" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1" opacity="0.5"/>
<text x="340" y="297" text-anchor="middle" fill="#3C3489" font-weight="bold" font-size="12">Dynamic Graph: nodi/archi con timestamp</text>
<text x="340" y="317" text-anchor="middle" fill="#534AB7" font-size="10">Alice -[works_at]-> TechCorp (valid: 2020-01-15 to 2023-06-30) | Essenziale per audit trail</text>
</svg>
