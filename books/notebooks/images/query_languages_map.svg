<svg width="680" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" style="background:#fff;font-family:Arial,Helvetica,sans-serif">
<defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round"/></marker></defs>
<text x="340" y="22" text-anchor="middle" font-weight="bold" font-size="14" fill="#333">Tre linguaggi, un grafo: SPARQL vs Cypher vs Gremlin</text>

<!-- Central graph icon -->
<circle cx="340" cy="140" r="45" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.5"/>
<text x="340" y="136" text-anchor="middle" fill="#2C2C2A" font-weight="bold" font-size="12">Knowledge</text>
<text x="340" y="152" text-anchor="middle" fill="#2C2C2A" font-weight="bold" font-size="12">Graph</text>

<!-- SPARQL -->
<line x1="295" y1="140" x2="165" y2="110" stroke="#1E40AF" stroke-width="1.5"/>
<rect x="40" y="70" width="190" height="80" rx="10" fill="#E6F1FB" stroke="#1E40AF" stroke-width="1.5"/>
<text x="135" y="93" text-anchor="middle" fill="#0C447C" font-weight="bold" font-size="14">SPARQL</text>
<text x="135" y="110" text-anchor="middle" fill="#185FA5" font-size="10">W3C Standard | RDF</text>
<text x="135" y="125" text-anchor="middle" fill="#185FA5" font-size="10">Dichiarativo | Reasoning</text>
<text x="135" y="140" text-anchor="middle" fill="#185FA5" font-size="10">Wikidata, DBpedia</text>

<!-- Cypher -->
<line x1="340" y1="185" x2="340" y2="220" stroke="#065F46" stroke-width="1.5"/>
<rect x="245" y="220" width="190" height="80" rx="10" fill="#D1FAE5" stroke="#065F46" stroke-width="1.5"/>
<text x="340" y="243" text-anchor="middle" fill="#04342C" font-weight="bold" font-size="14">Cypher</text>
<text x="340" y="260" text-anchor="middle" fill="#0F6E56" font-size="10">Neo4j native | Property Graph</text>
<text x="340" y="275" text-anchor="middle" fill="#0F6E56" font-size="10">Visuale | Pattern Matching</text>
<text x="340" y="290" text-anchor="middle" fill="#0F6E56" font-size="10">GQL ISO standard (2024)</text>

<!-- Gremlin -->
<line x1="385" y1="140" x2="510" y2="110" stroke="#854F0B" stroke-width="1.5"/>
<rect x="450" y="70" width="190" height="80" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.5"/>
<text x="545" y="93" text-anchor="middle" fill="#412402" font-weight="bold" font-size="14">Gremlin</text>
<text x="545" y="110" text-anchor="middle" fill="#854F0B" font-size="10">Apache TinkerPop | Multi-DB</text>
<text x="545" y="125" text-anchor="middle" fill="#854F0B" font-size="10">Imperativo | Traversal</text>
<text x="545" y="140" text-anchor="middle" fill="#854F0B" font-size="10">JanusGraph, CosmosDB</text>

<!-- Decision guide -->
<rect x="60" y="320" width="560" height="44" rx="8" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1"/>
<text x="340" y="338" text-anchor="middle" fill="#333" font-size="11">Reasoning semantico? → SPARQL</text>
<text x="340" y="354" text-anchor="middle" fill="#333" font-size="11">Query intuitive + Neo4j? → Cypher  |  Multi-database? → Gremlin</text>
</svg>
