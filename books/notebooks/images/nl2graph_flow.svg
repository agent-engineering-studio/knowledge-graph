<svg width="680" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg" style="background:#fff;font-family:Arial,Helvetica,sans-serif">
<defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round"/></marker></defs>
<text x="340" y="22" text-anchor="middle" font-weight="bold" font-size="14" fill="#333">NL2Graph: da linguaggio naturale a query sul grafo</text>

<!-- Input -->
<rect x="30" y="55" width="200" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text x="130" y="77" text-anchor="middle" fill="#2C2C2A" font-weight="bold" font-size="11">Domanda utente</text>
<text x="130" y="95" text-anchor="middle" fill="#5F5E5A" font-size="9">"Film sci-fi di Spielberg?"</text>

<line x1="230" y1="83" x2="280" y2="83" stroke="#888" stroke-width="1" marker-end="url(#a)"/>

<!-- LLM -->
<rect x="282" y="50" width="160" height="66" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
<text x="362" y="74" text-anchor="middle" fill="#3C3489" font-weight="bold" font-size="12">LLM</text>
<text x="362" y="90" text-anchor="middle" fill="#534AB7" font-size="9">Schema-aware</text>
<text x="362" y="103" text-anchor="middle" fill="#534AB7" font-size="9">+ few-shot examples</text>

<line x1="442" y1="83" x2="492" y2="83" stroke="#888" stroke-width="1" marker-end="url(#a)"/>

<!-- Output Cypher -->
<rect x="494" y="45" width="170" height="76" rx="8" fill="#D1FAE5" stroke="#065F46" stroke-width="1"/>
<text x="579" y="67" text-anchor="middle" fill="#04342C" font-weight="bold" font-size="11">Cypher generato</text>
<text x="579" y="84" text-anchor="middle" fill="#0F6E56" font-size="8" font-family="Consolas">MATCH (d:Director</text>
<text x="579" y="96" text-anchor="middle" fill="#0F6E56" font-size="8" font-family="Consolas">{name:"Spielberg"})</text>
<text x="579" y="108" text-anchor="middle" fill="#0F6E56" font-size="8" font-family="Consolas">-[:DIRECTED]->(m:Movie)</text>

<!-- Pipeline steps below -->
<rect x="60" y="155" width="140" height="44" rx="6" fill="#DBEAFE" stroke="#1E40AF" stroke-width="0.5"/>
<text x="130" y="174" text-anchor="middle" fill="#0C447C" font-weight="bold" font-size="10">Entity Recognition</text>
<text x="130" y="188" text-anchor="middle" fill="#185FA5" font-size="8">"Spielberg" → Person</text>

<line x1="200" y1="177" x2="225" y2="177" stroke="#888" stroke-width="1" marker-end="url(#a)"/>

<rect x="227" y="155" width="140" height="44" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="297" y="174" text-anchor="middle" fill="#633806" font-weight="bold" font-size="10">Intent Parsing</text>
<text x="297" y="188" text-anchor="middle" fill="#854F0B" font-size="8">"sci-fi" → Genre filter</text>

<line x1="367" y1="177" x2="392" y2="177" stroke="#888" stroke-width="1" marker-end="url(#a)"/>

<rect x="394" y="155" width="140" height="44" rx="6" fill="#D1FAE5" stroke="#065F46" stroke-width="0.5"/>
<text x="464" y="174" text-anchor="middle" fill="#04342C" font-weight="bold" font-size="10">Query Generation</text>
<text x="464" y="188" text-anchor="middle" fill="#0F6E56" font-size="8">Schema + few-shot → Cypher</text>

<!-- Bottom note -->
<rect x="100" y="225" width="480" height="38" rx="6" fill="#FFF3E0" stroke="#BA7517" stroke-width="0.5"/>
<text x="340" y="244" text-anchor="middle" fill="#633806" font-size="10">Approcci: Rule-based (template) → Semantic parsing → LLM-based (stato dell'arte 2025)</text>
<text x="340" y="256" text-anchor="middle" fill="#854F0B" font-size="9">Accuracy: ~85-92% con schema docs + few-shot examples</text>
</svg>
