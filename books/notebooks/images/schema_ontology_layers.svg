<svg width="680" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg" style="background:#fff;font-family:Arial,Helvetica,sans-serif">
<text x="340" y="22" text-anchor="middle" font-weight="bold" font-size="14" fill="#333">La piramide semantica: da Schema a Ragionamento</text>

<!-- Layer 1: Data -->
<rect x="120" y="310" width="440" height="60" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.5"/>
<text x="340" y="336" text-anchor="middle" fill="#2C2C2A" font-weight="bold" font-size="14">Dati (Istanze)</text>
<text x="340" y="354" text-anchor="middle" fill="#5F5E5A" font-size="10">ex:alice foaf:name "Alice" ;  ex:works_at ex:techcorp .</text>

<!-- Layer 2: Schema -->
<rect x="150" y="235" width="380" height="60" rx="8" fill="#DBEAFE" stroke="#1E40AF" stroke-width="1.5"/>
<text x="340" y="261" text-anchor="middle" fill="#0C447C" font-weight="bold" font-size="14">Schema (RDFS)</text>
<text x="340" y="279" text-anchor="middle" fill="#185FA5" font-size="10">Classi, proprieta, domini, range, subClassOf</text>

<!-- Layer 3: Ontology -->
<rect x="180" y="160" width="320" height="60" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
<text x="340" y="186" text-anchor="middle" fill="#3C3489" font-weight="bold" font-size="14">Ontologia (OWL)</text>
<text x="340" y="204" text-anchor="middle" fill="#534AB7" font-size="10">Restrizioni, cardinalita, disjoint, equivalenza</text>

<!-- Layer 4: Validation -->
<rect x="210" y="85" width="260" height="60" rx="8" fill="#D1FAE5" stroke="#065F46" stroke-width="1.5"/>
<text x="340" y="111" text-anchor="middle" fill="#04342C" font-weight="bold" font-size="14">Validazione (SHACL/ShEx)</text>
<text x="340" y="129" text-anchor="middle" fill="#0F6E56" font-size="10">Shape constraints, conformance</text>

<!-- Layer 5: Reasoning -->
<rect x="250" y="35" width="180" height="38" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.5"/>
<text x="340" y="59" text-anchor="middle" fill="#412402" font-weight="bold" font-size="13">Ragionamento</text>

<!-- Side labels -->
<text x="60" y="345" text-anchor="middle" fill="#888" font-size="9" transform="rotate(-90,60,345)">Espressivita crescente →</text>
<text x="640" y="345" text-anchor="middle" fill="#888" font-size="9" transform="rotate(90,640,345)">← Complessita crescente</text>
</svg>
