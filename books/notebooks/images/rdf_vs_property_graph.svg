<svg width="680" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" style="background:#fff;font-family:Arial,Helvetica,sans-serif">
<text x="340" y="22" text-anchor="middle" font-weight="bold" font-size="14" fill="#333">RDF vs Property Graph: due filosofie, un obiettivo</text>

<!-- RDF Side -->
<rect x="20" y="45" width="310" height="355" rx="12" fill="#E6F1FB" stroke="#185FA5" stroke-width="1" opacity="0.3"/>
<text x="175" y="70" text-anchor="middle" fill="#0C447C" font-weight="bold" font-size="14">Modello RDF</text>
<text x="175" y="88" text-anchor="middle" fill="#185FA5" font-size="10">Standard W3C - Semantic Web</text>

<!-- RDF triples -->
<rect x="40" y="105" width="270" height="24" rx="4" fill="#fff" stroke="#B5D4F4" stroke-width="0.5"/>
<text x="50" y="121" fill="#0C447C" font-size="10" font-family="Consolas">(ex:alice, rdf:type, foaf:Person)</text>
<rect x="40" y="133" width="270" height="24" rx="4" fill="#fff" stroke="#B5D4F4" stroke-width="0.5"/>
<text x="50" y="149" fill="#0C447C" font-size="10" font-family="Consolas">(ex:alice, foaf:name, "Alice")</text>
<rect x="40" y="161" width="270" height="24" rx="4" fill="#fff" stroke="#B5D4F4" stroke-width="0.5"/>
<text x="50" y="177" fill="#0C447C" font-size="10" font-family="Consolas">(ex:alice, foaf:age, 30)</text>
<rect x="40" y="189" width="270" height="24" rx="4" fill="#fff" stroke="#B5D4F4" stroke-width="0.5"/>
<text x="50" y="205" fill="#0C447C" font-size="10" font-family="Consolas">(ex:alice, foaf:knows, ex:bob)</text>

<text x="175" y="235" text-anchor="middle" fill="#185FA5" font-size="10" font-weight="bold">4 triple per 1 fatto con 3 attributi</text>

<!-- RDF Pro/Con -->
<rect x="40" y="255" width="130" height="58" rx="6" fill="#D1FAE5" stroke="#065F46" stroke-width="0.5"/>
<text x="105" y="273" text-anchor="middle" fill="#04342C" font-weight="bold" font-size="10">Pro</text>
<text x="105" y="288" text-anchor="middle" fill="#0F6E56" font-size="9">Standard W3C</text>
<text x="105" y="301" text-anchor="middle" fill="#0F6E56" font-size="9">Reasoning (OWL)</text>

<rect x="180" y="255" width="130" height="58" rx="6" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text x="245" y="273" text-anchor="middle" fill="#501313" font-weight="bold" font-size="10">Contro</text>
<text x="245" y="288" text-anchor="middle" fill="#791F1F" font-size="9">Verboso</text>
<text x="245" y="301" text-anchor="middle" fill="#791F1F" font-size="9">Curva ripida</text>

<text x="175" y="342" text-anchor="middle" fill="#0C447C" font-size="10">Query: SPARQL</text>
<text x="175" y="358" text-anchor="middle" fill="#0C447C" font-size="10">DB: Virtuoso, Fuseki, Stardog</text>
<text x="175" y="374" text-anchor="middle" fill="#0C447C" font-size="10">Formato: Turtle, RDF/XML, JSON-LD</text>

<!-- Property Graph Side -->
<rect x="350" y="45" width="310" height="355" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1" opacity="0.3"/>
<text x="505" y="70" text-anchor="middle" fill="#04342C" font-weight="bold" font-size="14">Property Graph</text>
<text x="505" y="88" text-anchor="middle" fill="#0F6E56" font-size="10">De facto standard - Neo4j, TinkerPop</text>

<!-- PG visual -->
<ellipse cx="430" cy="150" rx="50" ry="25" fill="#DBEAFE" stroke="#1E40AF" stroke-width="1"/>
<text x="430" y="147" text-anchor="middle" fill="#0C447C" font-weight="bold" font-size="10">:Person</text>
<text x="430" y="160" text-anchor="middle" fill="#185FA5" font-size="8">name:"Alice",age:30</text>

<ellipse cx="580" cy="150" rx="50" ry="25" fill="#D1FAE5" stroke="#065F46" stroke-width="1"/>
<text x="580" y="147" text-anchor="middle" fill="#04342C" font-weight="bold" font-size="10">:Person</text>
<text x="580" y="160" text-anchor="middle" fill="#0F6E56" font-size="8">name:"Bob"</text>

<line x1="480" y1="150" x2="528" y2="150" stroke="#854F0B" stroke-width="1.5" marker-end="url(#a)"/>
<rect x="485" y="130" width="55" height="16" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="512" y="142" text-anchor="middle" fill="#633806" font-size="8">KNOWS</text>

<text x="505" y="210" text-anchor="middle" fill="#065F46" font-size="10" font-weight="bold">1 nodo = entita + tutti gli attributi</text>
<text x="505" y="226" text-anchor="middle" fill="#065F46" font-size="10" font-weight="bold">Proprieta native sugli archi</text>

<!-- PG Pro/Con -->
<rect x="370" y="255" width="130" height="58" rx="6" fill="#D1FAE5" stroke="#065F46" stroke-width="0.5"/>
<text x="435" y="273" text-anchor="middle" fill="#04342C" font-weight="bold" font-size="10">Pro</text>
<text x="435" y="288" text-anchor="middle" fill="#0F6E56" font-size="9">Intuitivo</text>
<text x="435" y="301" text-anchor="middle" fill="#0F6E56" font-size="9">Performance query</text>

<rect x="510" y="255" width="130" height="58" rx="6" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text x="575" y="273" text-anchor="middle" fill="#501313" font-weight="bold" font-size="10">Contro</text>
<text x="575" y="288" text-anchor="middle" fill="#791F1F" font-size="9">No reasoning nativo</text>
<text x="575" y="301" text-anchor="middle" fill="#791F1F" font-size="9">Meno standardizzato</text>

<text x="505" y="342" text-anchor="middle" fill="#04342C" font-size="10">Query: Cypher, Gremlin</text>
<text x="505" y="358" text-anchor="middle" fill="#04342C" font-size="10">DB: Neo4j, JanusGraph, TigerGraph</text>
<text x="505" y="374" text-anchor="middle" fill="#04342C" font-size="10">Formato: GraphML, JSON nativo</text>

<defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round"/></marker></defs>
</svg>
