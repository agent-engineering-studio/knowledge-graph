<svg width="680" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" style="background:#fff;font-family:Arial,Helvetica,sans-serif">
<defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round"/></marker></defs>
<text x="340" y="22" text-anchor="middle" font-weight="bold" font-size="14" fill="#333">Anatomia di una Triple RDF: (Soggetto, Predicato, Oggetto)</text>

<!-- Subject -->
<ellipse cx="120" cy="110" rx="80" ry="40" fill="#DBEAFE" stroke="#1E40AF" stroke-width="1.5"/>
<text x="120" y="103" text-anchor="middle" fill="#0C447C" font-weight="bold" font-size="13">Soggetto</text>
<text x="120" y="120" text-anchor="middle" fill="#185FA5" font-size="10">URI o Blank Node</text>

<!-- Predicate arrow -->
<line x1="200" y1="110" x2="370" y2="110" stroke="#854F0B" stroke-width="2" marker-end="url(#a)"/>
<rect x="240" y="80" width="120" height="28" rx="14" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text x="300" y="99" text-anchor="middle" fill="#633806" font-weight="bold" font-size="11">Predicato (URI)</text>

<!-- Object -->
<ellipse cx="480" cy="110" rx="80" ry="40" fill="#D1FAE5" stroke="#065F46" stroke-width="1.5"/>
<text x="480" y="103" text-anchor="middle" fill="#04342C" font-weight="bold" font-size="13">Oggetto</text>
<text x="480" y="120" text-anchor="middle" fill="#0F6E56" font-size="10">URI, BNode o Literal</text>

<!-- Concrete example -->
<rect x="40" y="180" width="600" height="120" rx="10" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1"/>
<text x="340" y="202" text-anchor="middle" fill="#666" font-size="11" font-style="italic">Esempio concreto</text>

<ellipse cx="130" cy="250" rx="75" ry="28" fill="#DBEAFE" stroke="#1E40AF" stroke-width="1"/>
<text x="130" y="254" text-anchor="middle" fill="#0C447C" font-weight="bold" font-size="11">ex:alice</text>

<line x1="205" y1="250" x2="370" y2="250" stroke="#854F0B" stroke-width="1.5" marker-end="url(#a)"/>
<rect x="245" y="236" width="100" height="22" rx="11" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text x="295" y="251" text-anchor="middle" fill="#633806" font-size="10">foaf:knows</text>

<ellipse cx="480" cy="250" rx="75" ry="28" fill="#D1FAE5" stroke="#065F46" stroke-width="1"/>
<text x="480" y="254" text-anchor="middle" fill="#04342C" font-weight="bold" font-size="11">ex:bob</text>

<!-- Literal example -->
<text x="590" y="210" text-anchor="middle" fill="#888" font-size="9">Literal:</text>
<rect x="560" y="215" width="60" height="20" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="590" y="229" text-anchor="middle" fill="#3C3489" font-size="9">"30"^^xsd:int</text>
</svg>
