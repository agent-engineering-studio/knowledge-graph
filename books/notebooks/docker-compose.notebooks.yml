# ── Notebook Environment ──────────────────────────────────────────────────────
#
# Avvia l'ambiente Jupyter Lab connesso allo stack KG.
#
# Prerequisito: avvia prima lo stack infra:
#   docker compose --profile dev up -d
#
# Poi avvia i notebook:
#   docker compose -f notebooks/docker-compose.notebooks.yml up -d
#
# Accesso: http://localhost:8888/?token=kglab
# ──────────────────────────────────────────────────────────────────────────────

services:
  jupyter:
    container_name: kg-jupyter
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8888:8888"
    volumes:
      - .:/notebooks
    environment:
      - NEO4J_URI=bolt://kg-neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-yourpassword}
      - REDIS_URL=redis://kg-redis:6379
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_LLM_MODEL=${OLLAMA_LLM_MODEL:-qwen2.5:14b}
      - OLLAMA_EMBEDDING_MODEL=${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
    networks:
      - kg_network

networks:
  kg_network:
    external: true
    name: kg_network
