# Development overrides — use with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:

  api:
    build:
      context: ./knowledge-graph-api
      dockerfile: infra/docker/Dockerfile
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./knowledge-graph-api:/app
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG

  ui:
    build:
      context: ./knowledge-graph-ui
      dockerfile: Dockerfile
      target: deps
    command: ["npm", "run", "dev"]
    volumes:
      - ./knowledge-graph-ui:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
