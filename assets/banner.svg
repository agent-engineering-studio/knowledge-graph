<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <!-- Node glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Accent gradient for nodes -->
    <radialGradient id="nodeBlue" cx="40%" cy="35%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </radialGradient>
    <radialGradient id="nodeCyan" cx="40%" cy="35%">
      <stop offset="0%" style="stop-color:#67e8f9"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </radialGradient>
    <radialGradient id="nodePurple" cx="40%" cy="35%">
      <stop offset="0%" style="stop-color:#c084fc"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </radialGradient>
    <radialGradient id="nodeGreen" cx="40%" cy="35%">
      <stop offset="0%" style="stop-color:#86efac"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </radialGradient>
    <radialGradient id="nodeAmber" cx="40%" cy="35%">
      <stop offset="0%" style="stop-color:#fcd34d"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </radialGradient>
    <radialGradient id="nodeRose" cx="40%" cy="35%">
      <stop offset="0%" style="stop-color:#fda4af"/>
      <stop offset="100%" style="stop-color:#e11d48"/>
    </radialGradient>
    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.3" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)" rx="12"/>
  <rect width="1200" height="400" fill="url(#grid)" rx="12"/>

  <!-- Decorative edges (graph connections) - left cluster -->
  <g stroke-width="1.5" fill="none" opacity="0.5">
    <!-- Left side connections -->
    <line x1="95" y1="80" x2="180" y2="150" stroke="#60a5fa" stroke-dasharray="4,4"/>
    <line x1="180" y1="150" x2="130" y2="250" stroke="#67e8f9" stroke-dasharray="4,4"/>
    <line x1="130" y1="250" x2="220" y2="310" stroke="#c084fc" stroke-dasharray="4,4"/>
    <line x1="180" y1="150" x2="280" y2="120" stroke="#86efac" stroke-dasharray="4,4"/>
    <line x1="280" y1="120" x2="310" y2="220" stroke="#60a5fa" stroke-dasharray="4,4"/>
    <line x1="310" y1="220" x2="220" y2="310" stroke="#fcd34d" stroke-dasharray="4,4"/>
    <line x1="310" y1="220" x2="280" y2="120" stroke="#c084fc" stroke-dasharray="4,4"/>
    <line x1="95" y1="80" x2="130" y2="250" stroke="#fda4af" stroke-dasharray="4,4" opacity="0.3"/>
    <line x1="60" y1="180" x2="130" y2="250" stroke="#60a5fa" stroke-dasharray="4,4"/>
    <line x1="60" y1="180" x2="95" y2="80" stroke="#67e8f9" stroke-dasharray="4,4"/>
    <line x1="60" y1="180" x2="180" y2="150" stroke="#c084fc" stroke-dasharray="4,4" opacity="0.3"/>

    <!-- Right side connections -->
    <line x1="920" y1="100" x2="1010" y2="180" stroke="#c084fc" stroke-dasharray="4,4"/>
    <line x1="1010" y1="180" x2="1100" y2="120" stroke="#60a5fa" stroke-dasharray="4,4"/>
    <line x1="1100" y1="120" x2="1130" y2="250" stroke="#67e8f9" stroke-dasharray="4,4"/>
    <line x1="1130" y1="250" x2="1010" y2="310" stroke="#86efac" stroke-dasharray="4,4"/>
    <line x1="1010" y1="310" x2="920" y2="260" stroke="#fcd34d" stroke-dasharray="4,4"/>
    <line x1="920" y1="260" x2="920" y2="100" stroke="#fda4af" stroke-dasharray="4,4" opacity="0.3"/>
    <line x1="920" y1="260" x2="1010" y2="180" stroke="#86efac" stroke-dasharray="4,4"/>
    <line x1="1010" y1="180" x2="1010" y2="310" stroke="#60a5fa" stroke-dasharray="4,4" opacity="0.3"/>
    <line x1="1100" y1="120" x2="920" y2="100" stroke="#c084fc" stroke-dasharray="4,4" opacity="0.3"/>
  </g>

  <!-- Graph nodes - left cluster -->
  <g filter="url(#glow)">
    <circle cx="95" cy="80" r="10" fill="url(#nodeBlue)" opacity="0.9"/>
    <circle cx="180" cy="150" r="14" fill="url(#nodeCyan)" opacity="0.9"/>
    <circle cx="130" cy="250" r="11" fill="url(#nodePurple)" opacity="0.9"/>
    <circle cx="220" cy="310" r="9" fill="url(#nodeGreen)" opacity="0.9"/>
    <circle cx="280" cy="120" r="12" fill="url(#nodeAmber)" opacity="0.9"/>
    <circle cx="310" cy="220" r="10" fill="url(#nodeRose)" opacity="0.9"/>
    <circle cx="60" cy="180" r="8" fill="url(#nodeBlue)" opacity="0.7"/>
  </g>

  <!-- Graph nodes - right cluster -->
  <g filter="url(#glow)">
    <circle cx="920" cy="100" r="11" fill="url(#nodePurple)" opacity="0.9"/>
    <circle cx="1010" cy="180" r="14" fill="url(#nodeBlue)" opacity="0.9"/>
    <circle cx="1100" cy="120" r="10" fill="url(#nodeGreen)" opacity="0.9"/>
    <circle cx="1130" cy="250" r="12" fill="url(#nodeCyan)" opacity="0.9"/>
    <circle cx="1010" cy="310" r="9" fill="url(#nodeAmber)" opacity="0.9"/>
    <circle cx="920" cy="260" r="10" fill="url(#nodeRose)" opacity="0.9"/>
  </g>

  <!-- Floating small dots for depth -->
  <g opacity="0.3">
    <circle cx="50" cy="50" r="2" fill="#60a5fa"/>
    <circle cx="350" cy="60" r="2.5" fill="#c084fc"/>
    <circle cx="380" cy="340" r="2" fill="#67e8f9"/>
    <circle cx="850" cy="60" r="2" fill="#86efac"/>
    <circle cx="870" cy="340" r="2.5" fill="#fcd34d"/>
    <circle cx="1150" cy="50" r="2" fill="#fda4af"/>
    <circle cx="1160" cy="340" r="2" fill="#60a5fa"/>
    <circle cx="150" cy="350" r="1.5" fill="#c084fc"/>
    <circle cx="40" cy="310" r="2" fill="#86efac"/>
    <circle cx="350" cy="160" r="1.5" fill="#fcd34d"/>
  </g>

  <!-- Central content area -->
  <!-- Knowledge graph icon -->
  <g transform="translate(600, 115)" filter="url(#glowStrong)">
    <!-- Central hub icon - stylized graph -->
    <circle cx="0" cy="0" r="28" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.6"/>
    <circle cx="0" cy="0" r="8" fill="#60a5fa" opacity="0.9"/>
    <!-- Satellite nodes -->
    <line x1="8" y1="0" x2="24" y2="-14" stroke="#67e8f9" stroke-width="1.5"/>
    <circle cx="26" cy="-16" r="5" fill="#67e8f9" opacity="0.9"/>
    <line x1="-5" y1="7" x2="-20" y2="18" stroke="#c084fc" stroke-width="1.5"/>
    <circle cx="-22" cy="20" r="5" fill="#c084fc" opacity="0.9"/>
    <line x1="5" y1="7" x2="22" y2="18" stroke="#86efac" stroke-width="1.5"/>
    <circle cx="24" cy="20" r="5" fill="#86efac" opacity="0.9"/>
    <line x1="-7" y1="-3" x2="-25" y2="-12" stroke="#fcd34d" stroke-width="1.5"/>
    <circle cx="-27" cy="-14" r="5" fill="#fcd34d" opacity="0.9"/>
  </g>

  <!-- Title -->
  <text x="600" y="195" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#f8fafc" letter-spacing="-1">
    Knowledge Graph Lab
  </text>

  <!-- Subtitle -->
  <text x="600" y="235" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="18" fill="#94a3b8" font-weight="400" letter-spacing="0.5">
    dalla Teoria alla Pratica
  </text>

  <!-- Tech stack badges -->
  <g transform="translate(600, 280)" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="12" font-weight="500">
    <!-- Neo4j -->
    <rect x="-285" y="-12" width="72" height="24" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <circle cx="-272" cy="0" r="4" fill="#22c55e"/>
    <text x="-263" y="4" fill="#86efac">Neo4j</text>

    <!-- Redis -->
    <rect x="-198" y="-12" width="72" height="24" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <circle cx="-185" cy="0" r="4" fill="#e11d48"/>
    <text x="-176" y="4" fill="#fda4af">Redis</text>

    <!-- Ollama -->
    <rect x="-111" y="-12" width="80" height="24" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <circle cx="-98" cy="0" r="4" fill="#f59e0b"/>
    <text x="-89" y="4" fill="#fcd34d">Ollama</text>

    <!-- FastAPI -->
    <rect x="-16" y="-12" width="82" height="24" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <circle cx="-3" cy="0" r="4" fill="#06b6d4"/>
    <text x="6" y="4" fill="#67e8f9">FastAPI</text>

    <!-- Next.js -->
    <rect x="81" y="-12" width="78" height="24" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <circle cx="94" cy="0" r="4" fill="#f8fafc"/>
    <text x="103" y="4" fill="#e2e8f0">Next.js</text>

    <!-- RAG -->
    <rect x="174" y="-12" width="110" height="24" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <circle cx="187" cy="0" r="4" fill="#7c3aed"/>
    <text x="196" y="4" fill="#c084fc">RAG Pipeline</text>
  </g>

  <!-- Bottom tagline -->
  <text x="600" y="340" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="13" fill="#64748b" letter-spacing="3" font-weight="400">
    INGESTION  ·  VECTOR SEARCH  ·  GRAPH TRAVERSAL  ·  LLM GENERATION
  </text>

  <!-- Subtle border -->
  <rect width="1200" height="400" fill="none" stroke="#334155" stroke-width="1" rx="12" opacity="0.5"/>
</svg>